name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: release
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        run: cargo install --locked cargo-zigbuild

      # TODO: support Chocolatey later
      # - name: Install Chocolatey (via Mono)
      #   run: |
      #     sudo apt-get update && sudo apt-get install -y mono-runtime
      #     curl -L -o /tmp/choco.nupkg https://github.com/chocolatey/choco/releases/download/1.4.0/chocolatey.1.4.0.nupkg
      #     sudo mkdir -p /opt/chocolatey
      #     sudo unzip -o /tmp/choco.nupkg -d /opt/chocolatey
      #     sudo bash -c 'cat > /usr/local/bin/choco << "WRAPPER"
      #     #!/bin/bash
      #     mono /opt/chocolatey/tools/chocolateyInstall/choco.exe "$@"
      #     WRAPPER'
      #     sudo chmod +x /usr/local/bin/choco

      - name: Download macOS SDK
        run: curl -L https://github.com/phracker/MacOSX-SDKs/releases/download/11.3/MacOSX11.3.sdk.tar.xz | tar -xJ -C /tmp

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          # CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
          SDKROOT: /tmp/MacOSX11.3.sdk

      - name: Publish jj-spice-lib to crates.io
        run: cargo publish -p jj-spice-lib --quiet --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish jj-spice-cli to crates.io
        run: cargo publish -p jj-spice-cli --quiet --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Update Homebrew formula
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Download checksums generated by GoReleaser
          curl -sL "https://github.com/alejoborbo/jj-spice/releases/download/v${VERSION}/checksums.txt" -o checksums.txt

          # Extract sha256 for each platform
          SHA_DARWIN_ARM64=$(grep "darwin_arm64.tar.gz" checksums.txt | awk '{print $1}')
          SHA_DARWIN_X86_64=$(grep "darwin_amd64.tar.gz" checksums.txt | awk '{print $1}')
          SHA_LINUX_ARM64=$(grep "linux_arm64.tar.gz" checksums.txt | awk '{print $1}')
          SHA_LINUX_X86_64=$(grep "linux_amd64.tar.gz" checksums.txt | awk '{print $1}')

          # Clone the tap repo
          git clone "https://x-access-token:${GH_PAT}@github.com/alejoborbo/homebrew-tap.git" /tmp/homebrew-tap
          mkdir -p /tmp/homebrew-tap/Formula

          # Generate the formula
          cat > /tmp/homebrew-tap/Formula/jj-spice.rb << EOF
          class JjSpice < Formula
            desc "Stacked change requests for Jujutsu VCS"
            homepage "https://github.com/alejoborbo/jj-spice"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/alejoborbo/jj-spice/releases/download/v#{version}/jj-spice_#{version}_darwin_arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "https://github.com/alejoborbo/jj-spice/releases/download/v#{version}/jj-spice_#{version}_darwin_amd64.tar.gz"
                sha256 "${SHA_DARWIN_X86_64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/alejoborbo/jj-spice/releases/download/v#{version}/jj-spice_#{version}_linux_arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "https://github.com/alejoborbo/jj-spice/releases/download/v#{version}/jj-spice_#{version}_linux_amd64.tar.gz"
                sha256 "${SHA_LINUX_X86_64}"
              end
            end

            def install
              bin.install "jj-spice"
            end

            test do
              system bin/"jj-spice", "--version"
            end
          end
          EOF

          # Remove leading whitespace from heredoc indentation
          sed -i 's/^          //' /tmp/homebrew-tap/Formula/jj-spice.rb

          # Push to the tap repo
          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/jj-spice.rb
          git commit -m "Update jj-spice to ${VERSION}"
          git push
