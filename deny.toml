# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Vulnerability and unsound advisories always emit errors (no longer configurable).
# Unmaintained advisories: only fail for direct workspace dependencies.
unmaintained = "workspace"
yanked = "warn"

[licenses]
# Allow common permissive licenses.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "OpenSSL",
    "CC0-1.0",
    "BSL-1.0",
]
copyleft = "deny"

[bans]
# Prevent duplicate versions of the same crate where possible.
multiple-versions = "warn"
wildcards = "allow"

[sources]
# Only allow crates from crates.io.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
