syntax = "proto3";

package change_request;

// All change request mappings tracked by jj-spice.
message ChangeRequests {
  // Key: local jj bookmark name.
  map<string, ForgeMeta> by_bookmark = 1;
}

// Wrapper for the forge-specific oneof.
message ForgeMeta {
  oneof forge {
    GitHubMeta github = 10;
  }
}

// GitHub Pull Request identity.
message GitHubMeta {
  uint64 number = 1;          // PR number
  string source_branch = 2;   // head ref pushed to GitHub
  string target_branch = 3;   // base ref (e.g. "main")
  string source_repo = 4;     // fork origin (e.g. "user/repo"), empty for same-repo
  string target_repo = 5;     // target repo (e.g. "owner/repo"), empty for same-repo
  string graphql_id = 6;      // GraphQL node ID, for future mutation use
  optional uint64 comment_id = 7;      // comment ID, for updating the stack trace in the Pull Request
}
